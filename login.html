<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion - Pistes de sécurité CDG 2026</title>
  <link href="css/css2.css" rel="stylesheet"/>
  <link href="css/all.min.css" rel="stylesheet" />
  <link href="css/safety-cdg.css" rel="stylesheet" >
  <script src="js/chart.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'DM Sans', sans-serif;
      background: linear-gradient(135deg, #0b1f33 0%, #1a2f44 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    .bg-shape {
      position: absolute;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 50%;
      animation: float 20s infinite ease-in-out;
    }
    .bg-shape:nth-child(1) {
      width: 400px;
      height: 400px;
      top: -100px;
      left: -100px;
    }
    .bg-shape:nth-child(2) {
      width: 300px;
      height: 300px;
      bottom: -50px;
      right: -50px;
      animation-delay: -5s;
    }
    .bg-shape:nth-child(3) {
      width: 200px;
      height: 200px;
      bottom: 20%;
      left: 10%;
      animation-delay: -10s;
    }
    @keyframes float {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      33% { transform: translate(30px, -30px) rotate(120deg); }
      66% { transform: translate(-20px, 20px) rotate(240deg); }
    }
    .login-container {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 32px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      width: 90%;
      max-width: 440px;
      padding: 48px 40px;
      position: relative;
      z-index: 10;
      animation: slideUp 0.6s ease-out;
    }
    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .login-header {
      text-align: center;
      margin-bottom: 40px;
    }
    .login-icon {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #1a56db 0%, #2563eb 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      box-shadow: 0 10px 20px -5px rgba(26, 86, 219, 0.5);
    }
    .login-icon i {
      font-size: 40px;
      color: white;
    }
    .login-title {
      font-family: 'Syne', sans-serif;
      font-size: 28px;
      font-weight: 800;
      color: #1e293b;
      margin-bottom: 8px;
      letter-spacing: -0.02em;
    }
    .login-subtitle {
      color: #64748b;
      font-size: 14px;
      font-weight: 400;
    }
    .form-group {
      margin-bottom: 24px;
    }
    .form-label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #334155;
      margin-bottom: 8px;
    }
    .input-wrapper {
      position: relative;
    }
    .input-wrapper i {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: #94a3b8;
      font-size: 18px;
      transition: color 0.2s;
    }
    .input-wrapper input {
      width: 100%;
      padding: 14px 16px 14px 48px;
      border: 2px solid #e2e8f0;
      border-radius: 16px;
      font-size: 15px;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.2s;
      background: white;
    }
    .input-wrapper input:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
    }
    .input-wrapper input:focus + i {
      color: #2563eb;
    }
    .input-wrapper input.error {
      border-color: #dc2626;
      animation: shake 0.3s ease-in-out;
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }
    .password-toggle {
      position: absolute;
      left: auto;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: #94a3b8;
      cursor: pointer;
      font-size: 18px;
      transition: color 0.2s;
    }
    .password-toggle:hover {
      color: #2563eb;
    }
    .input-wrapper .password-toggle {
      left: auto;
      right: 16px;
    }
    .input-wrapper .fa-user {
      left: auto;
      right: 16px;
    }
    .login-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #1a56db 0%, #2563eb 100%);
      border: none;
      border-radius: 16px;
      color: white;
      font-size: 16px;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 16px;
      position: relative;
      overflow: hidden;
    }
    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px -5px rgba(37, 99, 235, 0.5);
    }
    .login-btn:active {
      transform: translateY(0);
    }
    .login-btn.loading {
      pointer-events: none;
      opacity: 0.8;
    }
    .login-btn.loading::after {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
      top: 50%;
      left: 50%;
      margin-left: -10px;
      margin-top: -10px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s infinite linear;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .error-message {
      background: #fee2e2;
      color: #dc2626;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 8px;
      border: 1px solid #fecaca;
    }
    .error-message i {
      font-size: 16px;
    }
    .footer-text {
      text-align: center;
      margin-top: 32px;
      color: #94a3b8;
      font-size: 13px;
    }
    .demo-credentials {
      background: #f8fafc;
      border-radius: 12px;
      padding: 16px;
      margin-top: 24px;
      border: 1px dashed #cbd5e1;
    }
    .demo-credentials-title {
      font-size: 13px;
      font-weight: 600;
      color: #475569;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .demo-credentials-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #64748b;
      font-family: monospace;
      background: white;
      padding: 6px 10px;
      border-radius: 6px;
      margin-bottom: 4px;
    }
    .demo-credentials-item i {
      color: #2563eb;
      font-size: 12px;
    }
    .security-badge {
      position: absolute;
      bottom: 20px;
      left: 20px;
      color: rgba(255, 255, 255, 0.5);
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .security-badge i {
      font-size: 14px;
    }
  </style>
</head>
<body>
  
  <div class="bg-shape"></div>
  <div class="bg-shape"></div>
  <div class="bg-shape"></div>

  <div class="login-container">
    <div class="login-header">
      <div class="login-icon">
        <i class="fa-solid fa-shield-halved"></i>
      </div>
      <h1 class="login-title">Pistes de sécurité CDG 2026</h1>
      <p class="login-subtitle">Interface de gestion sécurisée</p>
    </div>

    <div id="error-container" style="display: none;">
      <div class="error-message">
        <i class="fa-solid fa-circle-exclamation"></i>
        <span id="error-text">Identifiants incorrects</span>
      </div>
    </div>

    <form id="login-form" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label class="form-label" for="username">Identifiant</label>
        <div class="input-wrapper">
          <i class="fa-regular fa-user"></i>
          <input type="text" id="username" name="username" placeholder="Entrez votre identifiant" autocomplete="off" autofocus>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Mot de passe</label>
        <div class="input-wrapper">
          <i class="fa-solid fa-lock"></i>
          <input type="password" id="password" name="password" placeholder="Entrez votre mot de passe">
          <i class="fa-regular fa-eye password-toggle" id="togglePassword" onclick="togglePasswordVisibility()"></i>
        </div>
      </div>

      <button type="submit" class="login-btn" id="login-btn">
        <span>Se connecter</span>
      </button>
    </form>


    <div class="footer-text">
      <i class="fa-regular fa-copyright"></i> Groupe ARPEX - Tous droits réservés
    </div>
  </div>

  <div class="security-badge">
    <i class="fa-solid fa-lock"></i>
    Connexion sécurisée
  </div>

  <script>
    const VALID_USERNAME = 'arpex';
    const VALID_PASSWORD = 'arpex2026';
    function togglePasswordVisibility() {
      const passwordInput = document.getElementById('password');
      const toggleIcon = document.getElementById('togglePassword');
      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        toggleIcon.className = 'fa-regular fa-eye-slash password-toggle';
      } else {
        passwordInput.type = 'password';
        toggleIcon.className = 'fa-regular fa-eye password-toggle';
      }
    }
    function showError(message) {
      const errorContainer = document.getElementById('error-container');
      const errorText = document.getElementById('error-text');
      errorText.textContent = message;
      errorContainer.style.display = 'block';
      document.getElementById('username').classList.add('error');
      document.getElementById('password').classList.add('error');
      setTimeout(() => {
        document.getElementById('username').classList.remove('error');
        document.getElementById('password').classList.remove('error');
      }, 300);
    }
    function handleLogin(event) {
      event.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const loginBtn = document.getElementById('login-btn');
      document.getElementById('error-container').style.display = 'none';
      if (!username || !password) {
        showError('Veuillez remplir tous les champs');
        return;
      }
      loginBtn.classList.add('loading');
      setTimeout(() => {
        if (username === VALID_USERNAME && password === VALID_PASSWORD) {
          sessionStorage.setItem('cdg2026_authenticated', 'true');
          sessionStorage.setItem('cdg2026_user', username);
          window.location.href = 'index_notation.html';
        } else {
          loginBtn.classList.remove('loading');
          showError('Identifiant ou mot de passe incorrect');
        }
      }, 500);
    }
    window.addEventListener('pageshow', function(event) {
      if (event.persisted) {
        window.location.reload();
      }
    });
    document.addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        handleLogin(e);
      }
    });
  </script>
</body>
</html>
