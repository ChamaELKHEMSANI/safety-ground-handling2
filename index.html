
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirection - Pistes de sécurité CDG 2026</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #0b1f33 0%, #1a2f44 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }

    .redirect-container {
      text-align: center;
      padding: 40px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border-radius: 32px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      max-width: 400px;
      width: 90%;
      animation: fadeIn 0.5s ease-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .shield-icon {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #1a56db 0%, #2563eb 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      box-shadow: 0 10px 20px -5px rgba(26, 86, 219, 0.5);
    }

    .shield-icon svg {
      width: 40px;
      height: 40px;
      fill: white;
    }

    h1 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 16px;
      color: white;
    }

    .loader {
      margin: 30px 0;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(255, 255, 255, 0.1);
      border-top-color: #2563eb;
      border-radius: 50%;
      animation: spin 1s infinite linear;
      margin: 0 auto;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .status-message {
      font-size: 16px;
      color: rgba(255, 255, 255, 0.8);
      margin-bottom: 20px;
    }

    .manual-link {
      display: inline-block;
      padding: 12px 24px;
      background: rgba(255, 255, 255, 0.15);
      color: white;
      text-decoration: none;
      border-radius: 12px;
      font-size: 14px;
      transition: all 0.3s;
      border: 1px solid rgba(255, 255, 255, 0.2);
      margin-top: 20px;
    }

    .manual-link:hover {
      background: rgba(255, 255, 255, 0.25);
      transform: translateY(-2px);
    }

    .manual-link i {
      margin-right: 8px;
    }

    .footer {
      margin-top: 30px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.4);
    }
  </style>
</head>
<body>
  <div class="redirect-container">
    <div class="shield-icon">
      <svg viewBox="0 0 24 24">
        <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/>
      </svg>
    </div>
    
    <h1>Pistes de sécurité CDG 2026</h1>
    
    <div class="loader">
      <div class="spinner"></div>
    </div>
    
    <div class="status-message" id="statusMessage">
      Vérification de votre connexion...
    </div>

    <a href="login.html" class="manual-link" id="manualLink" style="display: none;">
      <i class="fa-solid fa-arrow-right"></i>
      Aller à la page de connexion
    </a>

    <div class="footer">
      <span id="redirectCountdown"></span>
    </div>
  </div>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <script>
    (function() {
      function setStatusMessage(message, isError = false) {
        const statusEl = document.getElementById('statusMessage');
        statusEl.textContent = message;
        if (isError) {
          statusEl.style.color = '#fca5a5';
        } else {
          statusEl.style.color = 'rgba(255, 255, 255, 0.8)';
        }
      }

      function startCountdown(seconds, targetUrl) {
        const countdownEl = document.getElementById('redirectCountdown');
        let remaining = seconds;
        
        const interval = setInterval(() => {
          remaining--;
          if (remaining > 0) {
            countdownEl.textContent = `Redirection dans ${remaining} seconde${remaining > 1 ? 's' : ''}...`;
          } else {
            clearInterval(interval);
          }
        }, 1000);
      }

      const isAuthenticated = sessionStorage.getItem('cdg2026_authenticated') === 'true';
      const currentPage = window.location.pathname.split('/').pop() || 'index.html';
      
      console.log('État de connexion:', isAuthenticated ? 'Connecté' : 'Non connecté');
      
      // Petite animation pour montrer la vérification
      setTimeout(() => {
        if (isAuthenticated) {
          setStatusMessage('Connexion détectée, redirection vers l\'interface...');
          startCountdown(2, 'index_notation.html');
          
          setTimeout(() => {
            window.location.href = 'index_notation.html';
          }, 2000);
        } else {
          setStatusMessage('Vous n\'êtes pas connecté, redirection vers la page de connexion...');
          startCountdown(2, 'login.html');
          
          setTimeout(() => {
            document.getElementById('manualLink').style.display = 'inline-block';
          }, 2000);
          
          setTimeout(() => {
            window.location.href = 'login.html';
          }, 2000);
        }
      }, 1000);

      setTimeout(() => {
        const manualLink = document.getElementById('manualLink');
        if (manualLink.style.display === 'none') {
          manualLink.style.display = 'inline-block';
          setStatusMessage('La redirection automatique a échoué. Veuillez cliquer sur le lien ci-dessous.', true);
        }
      }, 5000);
    })();
  </script>
</body>
</html>
